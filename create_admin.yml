---
- hosts: proxmox_servers, centos_servers
  become: true
  tasks:
  - name: create admin user
    tags: always
    ansible.builtin.user:
      name: ansible
      groups: root

  - name: add sudoers file admin user ansible
    tags: always
    ansible.builtin.copy:
      src: sudoers_ansible
      dest: /etc/sudoers.d/ansible
      owner: root
      group: root
      mode: 0440

  - name: add ssh key for ansible user
    tags: always
    ansible.builtin.authorized_key:
      user: ansible
      key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOaYuJoLm9qCVFCtBbqbU96HGV/gssVI1gXZRbzxjChH administrator@centos.home.local"