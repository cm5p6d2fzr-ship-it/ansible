---
- name: Join CentOS Stream servers to Active Directory
  hosts: centos_servers
  become: true

  vars:
    ad_domain: home.local
    ad_realm: HOME.LOCAL
    ad_join_user: administrator
    ad_dns_server: 192.168.1.6

    # Optional: restrict Linux login to this AD group.
    # Leave empty to skip realm permit.
    ad_permit_group: "Linux Admins@home.local"

  vars_prompt:
    - name: ad_join_password
      prompt: "AD password for {{ ad_join_user }}@{{ ad_realm }}"
      private: true

  tasks:
    - name: Install required packages
      ansible.builtin.dnf:
        name:
          - realmd
          - sssd
          - oddjob
          - oddjob-mkhomedir
          - samba-common-tools
          - krb5-workstation
          - adcli
          - python3-pexpect
          - NetworkManager
        state: present

    - name: Ensure NetworkManager is enabled and running
      ansible.builtin.systemd:
        name: NetworkManager
        enabled: true
        state: started

    - name: Get active NetworkManager connection
      ansible.builtin.command:
        cmd: nmcli -t -f NAME,DEVICE con show --active
      register: active_nm_connections
      changed_when: false

    - name: Set active NetworkManager connection fact
      ansible.builtin.set_fact:
        active_nm_connection: "{{ active_nm_connections.stdout_lines[0].split(':')[0] }}"
      when: active_nm_connections.stdout_lines | length > 0

    - name: Configure AD DNS server on active connection
      ansible.builtin.command:
        cmd: "nmcli con mod '{{ active_nm_connection }}' ipv4.dns '{{ ad_dns_server }}'"
      changed_when: true
      when: active_nm_connection is defined

    - name: Restart active NetworkManager connection
      ansible.builtin.command:
        cmd: "nmcli con up '{{ active_nm_connection }}'"
      changed_when: true
      when: active_nm_connection is defined

    - name: Check whether server is already joined to AD
      ansible.builtin.command:
        cmd: realm list
      register: realm_list
      changed_when: false
      failed_when: false

    - name: Discover AD domain
      ansible.builtin.command:
        cmd: "realm discover {{ ad_domain }}"
      changed_when: false

    - name: Join AD domain using Samba membership and SSSD client
      ansible.builtin.expect:
        command: >
          realm join -v {{ ad_domain }}
          -U {{ ad_join_user }}
          --client-software=sssd
          --membership-software=samba
        responses:
          "(?i)Password.*": "{{ ad_join_password }}"
        timeout: 120
      no_log: true
      when: ad_domain not in realm_list.stdout

    - name: Select SSSD auth profile with home directory creation
      ansible.builtin.command:
        cmd: authselect select sssd with-mkhomedir --force
      changed_when: true

    - name: Enable and restart SSSD
      ansible.builtin.systemd:
        name: sssd
        enabled: true
        state: restarted

    - name: Enable and start oddjobd
      ansible.builtin.systemd:
        name: oddjobd
        enabled: true
        state: started

    - name: Permit selected AD group to log in
      ansible.builtin.command:
        cmd: "realm permit -g '{{ ad_permit_group }}'"
      changed_when: true
      when:
        - ad_permit_group is defined
        - ad_permit_group | length > 0

    - name: Validate AD user lookup
      ansible.builtin.command:
        cmd: "getent passwd {{ ad_join_user }}@{{ ad_domain }}"
      register: getent_ad_user
      changed_when: false

    - name: Show AD lookup result
      ansible.builtin.debug:
        var: getent_ad_user.stdout