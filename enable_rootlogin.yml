---
- name: Temporarily enable root SSH on CentOS VM through Proxmox
  hosts: proxmox_servers
  become: true
  gather_facts: false

  vars_prompt:
    - name: target_vmids_input
      prompt: "Enter Proxmox VMID(s), comma-separated, for example: 101 or 101,102,103"
      private: false

  vars:
    target_vmids: "{{ target_vmids_input.split(',') | map('trim') | list }}"
    ansible_bootstrap_user: ansible

  tasks:
      - name: Check VM status
        ansible.builtin.command:
          cmd: "qm status {{ item }}"
        register: vm_status
        changed_when: false
        loop: "{{ target_vmids }}"

      - name: Start VM if not running
        ansible.builtin.command:
          cmd: "qm start {{ item.item }}"
        when: "'status: running' not in item.stdout"
        loop: "{{ vm_status.results }}"
        loop_control:
          label: "{{ item.item }}"

      - name: Wait until VM status is running
        ansible.builtin.command:
          cmd: "qm status {{ item }}"
        register: vm_running_status
        retries: 30
        delay: 5
        until: "'status: running' in vm_running_status.stdout"
        changed_when: false
        loop: "{{ target_vmids }}"

      - name: Wait for QEMU guest agent
        ansible.builtin.command:
          cmd: "qm guest ping {{ item }}"
        register: guest_ping
        retries: 30
        delay: 5
        until: guest_ping.rc == 0
        changed_when: false
        loop: "{{ target_vmids }}"
      - name: Enable temporary root SSH
        ansible.builtin.command:
          cmd: >
            qm guest exec {{ item }} --
            bash -lc "
            cat > /etc/ssh/sshd_config.d/99-temp-root-login.conf <<'EOF'
            PermitRootLogin yes
            PasswordAuthentication yes
            EOF
            systemctl restart sshd
            "
        loop: "{{ target_vmids }}"